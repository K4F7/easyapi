# Include inside the `location /` block for image.easyapi.work (openresty/nginx).
# Allows embedding only from Portal origins; reduces token leakage via Referer/history.

add_header Content-Security-Policy "frame-ancestors https://test.easyapi.work https://easyapi.work" always;
add_header Cache-Control "no-store" always;
add_header Referrer-Policy "no-referrer" always;
