name: Check-in diagnostics

on:
  workflow_dispatch:

jobs:
  checkin-diagnostics:
    name: Check-in on staging
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: newapi-portal

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: newapi-portal/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Preflight staging health
        run: |
          url="https://test.easyapi.work/api/health"
          for attempt in $(seq 1 12); do
            if response=$(curl -fsS "$url" 2>/dev/null) && echo "$response" | grep -q '"ok"[[:space:]]*:[[:space:]]*true'; then
              echo "Health OK: $url"
              echo "$response"
              exit 0
            fi
            echo "Waiting for $url ($attempt/12) ..."
            sleep 5
          done
          echo "Timed out waiting for $url"
          exit 1

      - name: Preflight staging login (E2E account)
        env:
          E2E_PORTAL_IDENTIFIER: ${{ secrets.E2E_PORTAL_IDENTIFIER }}
          E2E_PORTAL_PASSWORD: ${{ secrets.E2E_PORTAL_PASSWORD }}
        run: |
          for variable in E2E_PORTAL_IDENTIFIER E2E_PORTAL_PASSWORD; do
            if [ -z "${!variable}" ]; then
              echo "Missing required secret: ${variable}"
              exit 1
            fi
          done
          identifier="${E2E_PORTAL_IDENTIFIER}"
          password="${E2E_PORTAL_PASSWORD}"
          for attempt in $(seq 1 12); do
            response=$(curl -fsS -X POST "https://test.easyapi.work/api/auth/login" \
              -H "Content-Type: application/json" \
              -d "{\"identifier\":\"${identifier}\",\"password\":\"${password}\"}") && \
              echo "$response" | grep -q '"ok"[[:space:]]*:[[:space:]]*true' && {
                echo "$response"
                echo "Staging login preflight OK"
                exit 0
              }
            echo "Waiting for staging login preflight ($attempt/12) ..."
            sleep 5
          done
          echo "$response"
          echo "Staging login preflight failed"
          exit 1

      - name: Run check-in diagnostics
        env:
          CI: true
          E2E_BASE_URL: https://test.easyapi.work
          E2E_PORTAL_IDENTIFIER: ${{ secrets.E2E_PORTAL_IDENTIFIER }}
          E2E_PORTAL_PASSWORD: ${{ secrets.E2E_PORTAL_PASSWORD }}
        run: pnpm test:e2e:checkin

      - name: Upload diagnostics artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: checkin-diagnostics-artifacts
          if-no-files-found: ignore
          path: newapi-portal/playwright-report/
          retention-days: 7
