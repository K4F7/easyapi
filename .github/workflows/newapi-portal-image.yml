name: Build newapi-portal image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build and push portal image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push newapi-portal
        uses: docker/build-push-action@v6
        with:
          context: ./newapi-portal
          file: ./newapi-portal/Dockerfile
          push: true
          tags: ghcr.io/k4f7/easyapi/newapi-portal:test-latest
          build-args: |
            NEXT_PUBLIC_NEWAPI_BASE_URL=${{ vars.STAGING_PUBLIC_NEWAPI_BASE_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
