services:
  xbh-new-api:
    build:
      context: /opt/xbh-new-api
      dockerfile: Dockerfile
    image: xbh-new-api:latest
    container_name: xbh-new-api
    restart: always
    command: --log-dir /app/logs
    ports:
      - "3010:3000"
    environment:
      - TZ=Asia/Shanghai
      - ERROR_LOG_ENABLED=true
      - MEMORY_CACHE_ENABLED=true
    volumes:
      - /opt/xbh-new-api-data:/data
      - /opt/xbh-new-api-logs:/app/logs
