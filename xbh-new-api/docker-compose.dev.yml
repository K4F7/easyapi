# Frontend Development - Backend built from local source
#
# Usage:
#   1. docker compose -f docker-compose.dev.yml up -d
#   2. cd web && bun install && bun run dev
#   3. Open http://localhost:3001 (Rsbuild dev server, API auto-proxied to :3000)
#
# Rebuild backend after Go code changes:
#   docker compose -f docker-compose.dev.yml up -d --build new-api
#
# Stop:
#   docker compose -f docker-compose.dev.yml down
#
# Reset data:
#   docker compose -f docker-compose.dev.yml down -v

services:
  new-api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: new-api-dev:local
    container_name: new-api-dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - dev_data:/data
    environment:
      - SQL_DSN=postgresql://root:123456@postgres:5432/new-api
      - REDIS_CONN_STRING=redis://redis
      - TZ=Asia/Shanghai
      - BATCH_UPDATE_ENABLED=true
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - dev-network

  newapi-portal:
    build:
      context: ${PORTAL_BUILD_CONTEXT:-../newapi-portal}
      dockerfile: Dockerfile
    image: ${PORTAL_IMAGE:-newapi-portal-dev:local}
    container_name: newapi-portal-dev
    restart: unless-stopped
    ports:
      - "${PORTAL_PORT_BIND:-3001}:3000"
    environment:
      DATABASE_URL: ${PORTAL_DATABASE_URL:-postgresql://root:123456@postgres:5432/new-api?schema=newapi_portal}
      REDIS_URL: ${PORTAL_REDIS_URL:-redis://redis:6379/1}
      AUTH_SECRET: ${PORTAL_AUTH_SECRET:-dev-only-change-me-at-least-32-chars}
      APP_URL: ${PORTAL_APP_URL:-http://localhost:3001}
      NEWAPI_BASE_URL: ${PORTAL_NEWAPI_BASE_URL:-http://new-api:3000}
      NEWAPI_ADMIN_TOKEN: ${NEWAPI_ADMIN_TOKEN:-dev-only-replace-me}
      NEWAPI_ADMIN_USER_ID: ${NEWAPI_ADMIN_USER_ID:-1}
      REGISTER_QUOTA: ${REGISTER_QUOTA:-100000}
      CHECKIN_QUOTA: ${CHECKIN_QUOTA:-1000}
      INVITE_REWARD_QUOTA: ${INVITE_REWARD_QUOTA:-5000}
      TZ: Asia/Shanghai
    depends_on:
      new-api:
        condition: service_started
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - dev-network

  redis:
    image: redis:7-alpine
    container_name: new-api-dev-redis
    restart: unless-stopped
    networks:
      - dev-network

  postgres:
    image: postgres:15-alpine
    container_name: new-api-dev-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: new-api
    volumes:
      - dev_pg_data:/var/lib/postgresql/data
    networks:
      - dev-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d new-api"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  dev_data:
  dev_pg_data:

networks:
  dev-network:
    driver: bridge
